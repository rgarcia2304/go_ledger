version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ledger_db
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - ledger_data:/var/lib/postgresql/data

volumes:
  ledger_data:
